<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENO | The Stoic Operating System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --card: rgba(12, 12, 12, 0.98);
            --accent: #d4af37; 
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg);
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.8)),
                url('https://images.unsplash.com/photo-1599708137351-460d0059f143?q=80&w=2070'); /* Dark Marble/Statue Vibe */
            background-size: cover;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        nav {
            padding: 40px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            letter-spacing: 12px;
            color: var(--accent);
            text-transform: uppercase;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; text-shadow: 0 0 20px rgba(212, 175, 55, 0.4); } 100% { opacity: 0.8; } }

        .main-container {
            max-width: 850px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .zeno-card {
            background: var(--card);
            border-radius: 30px;
            padding: 60px;
            border: 1px solid rgba(212, 175, 55, 0.05);
            box-shadow: 0 60px 120px rgba(0,0,0,1);
        }

        textarea {
            width: 100%;
            background: #000;
            border: 1px solid #222;
            color: #fff;
            padding: 20px;
            margin-top: 15px;
            border-radius: 15px;
            font-family: inherit;
            font-size: 1.1rem;
            resize: none;
            transition: 0.4s;
        }

        textarea:focus { border-color: var(--accent); outline: none; background: #050505; }

        .virtue-tag {
            display: inline-block;
            background: #0a0a0a;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            margin: 8px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border: 1px solid #222;
            transition: 0.3s;
        }

        .virtue-tag.selected { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 24px;
            width: 100%;
            border-radius: 15px;
            font-weight: 900;
            letter-spacing: 4px;
            cursor: pointer;
            margin-top: 50px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .btn:hover { letter-spacing: 6px; box-shadow: 0 0 40px rgba(212, 175, 55, 0.3); }

        #zeno-output {
            margin-top: 50px;
            padding: 40px;
            background: rgba(212, 175, 55, 0.02);
            border-left: 5px solid var(--accent);
            border-radius: 0 20px 20px 0;
            display: none;
            animation: slideUp 1s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .annotation {
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.8;
            padding-top: 20px;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">ZENO</div>
    <div id="stat-count" style="font-size: 0.8rem; color: var(--accent); letter-spacing: 2px;">VIRTUE SESSIONS: 0</div>
</nav>

<div class="main-container">
    <div class="zeno-card">
        <h1 style="font-family: 'Playfair Display'; font-size: 2.8rem; margin: 0 0 40px 0; font-style: italic;">Align your mind.</h1>
        
        <label style="font-size: 0.8rem; color: var(--accent); letter-spacing: 3px; font-weight: bold;">01. THE IMPRESSION</label>
        <textarea id="examine" rows="3" placeholder="What is currently clouding your judgment?"></textarea>

        <div style="margin-top: 30px;">
            <div class="virtue-tag" onclick="this.classList.toggle('selected')">WISDOM</div>
            <div class="virtue-tag" onclick="this.classList.toggle('selected')">COURAGE</div>
            <div class="virtue-tag" onclick="this.classList.toggle('selected')">TEMPERANCE</div>
            <div class="virtue-tag" onclick="this.classList.toggle('selected')">JUSTICE</div>
        </div>

        <button class="btn" onclick="consultZeno()">Consult the Stoics</button>

        <div id="zeno-output">
            <p id="zeno-text" style="font-family: 'Playfair Display'; font-size: 1.6rem; line-height: 1.6; font-style: italic;"></p>
            <small id="zeno-author" style="color: var(--accent); letter-spacing: 4px; font-weight: bold; text-transform: uppercase;"></small>
            <div class="annotation" id="zeno-annotation"></div>
        </div>
    </div>
</div>

<script>
    const database = {
        fear: [
            { q: "We suffer more in imagination than in reality.", a: "Seneca", note: "The thing you are afraid of is a ghost. It has no power in the present moment. Strip away the story and deal with the facts." },
            { q: "He who fears death will never do anything worthy of a man who is alive.", a: "Seneca", note: "Fear is a form of paralysis. To be free, you must accept that external outcomes are not your business." }
        ],
        anger: [
            { q: "The best revenge is to be unlike him who performed the injury.", a: "Marcus Aurelius", note: "To stay angry is to let that person live in your head rent-free. Evict them by being better." },
            { q: "Anger, if not restrained, is frequently more hurtful to us than the injury that provokes it.", a: "Seneca", note: "You are setting your own house on fire to punish a neighbor. Put out the fire." }
        ],
        general: [
            { q: "You have power over your mind — not external events. Realize this, and you will find strength.", a: "Marcus Aurelius", note: "Stop trying to move the mountain. Focus on how you stand in front of it." },
            { q: "It is not what happens to you, but how you react to it that matters.", a: "Epictetus", note: "The event is the raw material; your character is the sculptor." }
        ]
    };

    let sessionCount = localStorage.getItem('zeno_v5_count') || 0;
    document.getElementById('stat-count').innerText = `VIRTUE SESSIONS: ${sessionCount}`;

    function consultZeno() {
        const input = document.getElementById('examine').value.toLowerCase();
        let category = "general";
        if (input.includes("fear") || input.includes("worry")) category = "fear";
        if (input.includes("angry") || input.includes("mad")) category = "anger";

        const pool = database[category];
        const selection = pool[Math.floor(Math.random() * pool.length)];

        document.getElementById('zeno-text').innerText = `"${selection.q}"`;
        document.getElementById('zeno-author').innerText = `— ${selection.a}`;
        document.getElementById('zeno-annotation').innerText = selection.note;
        
        document.getElementById('zeno-output').style.display = "block";
        document.getElementById('zeno-output').scrollIntoView({ behavior: 'smooth' });

        sessionCount++;
        localStorage.setItem('zeno_v5_count', sessionCount);
        document.getElementById('stat-count').innerText = `VIRTUE SESSIONS: ${sessionCount}`;
    }
</script>
</body>
</html>
